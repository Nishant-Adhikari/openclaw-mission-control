<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#05080E;color:#8A9BB0;font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#F7B731}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)}}
  @keyframes dropIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .dot{display:inline-block;border-radius:50%;animation:pulse 2.2s ease-in-out infinite;flex-shrink:0}
  .card{background:rgba(13,20,30,.85);border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:14px;transition:border-color .2s}
  .tab{background:none;border:none;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:9px 16px;color:#3A4A5A;border-bottom:2px solid transparent;transition:all .2s}
  .tab.on{color:#F7B731;border-bottom-color:#F7B731}
  .label{font-size:7px;letter-spacing:2px;color:#1E2A35;text-transform:uppercase;margin-bottom:3px}
  .scanline{position:fixed;inset:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
  .badge{font-size:7px;padding:1px 5px;border-radius:3px;margin-left:5px;font-family:'Share Tech Mono',monospace}
  .log-row{animation:slideIn .2s ease forwards;border-bottom:1px solid rgba(255,255,255,.03);padding:5px 0;display:flex;gap:12px}
  .stat-box{background:rgba(0,0,0,.3);border-radius:6px;padding:8px 10px}
  .alert{animation:dropIn .3s ease forwards;position:fixed;top:0;left:0;right:0;z-index:1000;padding:9px 24px;display:flex;align-items:center;gap:10px;font-size:11px}
</style>
</head>
<body>
<div id="root"></div>
<div class="scanline"></div>
<script>
const { useState, useEffect, useCallback } = React;
const e = React.createElement;

function getColor(name = "") {
  const n = name.toLowerCase();
  if (n.includes("jarvis")) return "#F7B731";
  if (n.includes("discord")) return "#4ECDC4";
  if (n.includes("cron")) return "#34D399";
  return "#8A9BB0";
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtAgo(ts) {
  if (!ts) return "—";
  const ms = Date.now() - ts;
  if (ms < 60000) return Math.max(1, Math.floor(ms / 1000)) + "s ago";
  if (ms < 3600000) return Math.floor(ms / 60000) + "m ago";
  if (ms < 86400000) return Math.floor(ms / 3600000) + "h ago";
  return Math.floor(ms / 86400000) + "d ago";
}

function fmtTime(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

function fmtNum(n) { return (n||0).toLocaleString(); }

// ── Components ────────────────────────────────────────────────────────────────
function Dot({color="#34D399", size=7}) {
  return e("span",{className:"dot",style:{width:size,height:size,background:color}});
}

function UsageBar({used=0, limit=1, color="#F7B731", h=6}) {
  const pct=Math.min((used/limit)*100,100);
  const c=pct>90?"#F87171":pct>75?"#F59E0B":color;
  return e("div",{style:{background:"rgba(0,0,0,.35)",borderRadius:99,height:h,width:"100%",overflow:"hidden"}},
    e("div",{style:{width:pct+"%",height:"100%",background:c,borderRadius:99,transition:"width 1s ease",boxShadow:pct>75?"0 0 8px "+c+"88":"none"}})
  );
}

function StatBox({label, value, color="#D4C9B4", small=false}) {
  return e("div",{className:"stat-box"},
    e("div",{className:"label"},label),
    e("div",{style:{fontFamily:small?"'Share Tech Mono',monospace":"'Playfair Display',serif",fontWeight:small?400:900,fontSize:small?10:14,color}},""+value)
  );
}

// ── Top Bar ───────────────────────────────────────────────────────────────────
function TopBar({openclaw={}, system={}, now, error}) {
  const discord = openclaw.channels?.channelAccounts?.discord?.[0];
  const healthy = openclaw.service?.healthy && discord?.probe?.ok;
  return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px",borderBottom:"1px solid rgba(247,183,49,.12)",background:"rgba(5,8,14,.98)",flexShrink:0}},
    e("div",{style:{display:"flex",alignItems:"center",gap:12}},
      e("span",{style:{fontSize:18}},"🎬"),
      e("div",null,
        e("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:900,color:"#F7B731",letterSpacing:1}},"Mission Control"),
        e("div",{style:{fontSize:7,color:"#1E2A35",letterSpacing:3}},"OPENCLAW OPS DASHBOARD")
      ),
      e("div",{style:{width:1,height:24,background:"rgba(255,255,255,.06)",margin:"0 6px"}}),
      error
        ? e("div",{style:{display:"flex",alignItems:"center",gap:6}},
            e(Dot,{color:"#F87171",size:6}),
            e("span",{style:{fontSize:9,color:"#F87171",letterSpacing:1}},"API ERROR")
          )
        : e("div",{style:{display:"flex",alignItems:"center",gap:6}},
            e(Dot,{color:healthy?"#34D399":"#F59E0B",size:6}),
            e("span",{style:{fontSize:9,color:healthy?"#34D399":"#F59E0B",letterSpacing:1}},
              healthy?"NOMINAL":"CHECK OPENCLAW"
            )
          )
    ),
    e("div",{style:{display:"flex",gap:20,alignItems:"center"}},
      e("div",null,e("div",{className:"label"},"SERVICE"),e("div",{style:{fontSize:9,color:openclaw.service?.healthy?"#34D399":"#F87171"}},openclaw.service?.active||"—")),
      e("div",null,e("div",{className:"label"},"MEMORY"),e("div",{style:{fontSize:9,color:(system.memPct||0)>80?"#F59E0B":"#34D399"}},(system.memPct||0)+"%")),
      e("div",null,e("div",{className:"label"},"DISK"),  e("div",{style:{fontSize:9,color:"#34D399"}},system.disk||"?")),
      e("div",null,e("div",{className:"label"},"TAILSCALE"),  e("div",{style:{fontSize:9,color:system.tailscaleIp?"#34D399":"#8A9BB0"}},system.tailscaleIp||"off")),
      e("div",{style:{fontFamily:"'Share Tech Mono',monospace",fontSize:13,color:"#F7B731",letterSpacing:2,minWidth:76}},
        now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"})
      )
    )
  );
}

// ── Overview Tab ──────────────────────────────────────────────────────────────
function OverviewTab({openclaw={}, system={}, tokens={}}) {
  const discord = openclaw.channels?.channelAccounts?.discord?.[0] || {};
  const jobs = openclaw.cron?.jobs || [];
  const unhealthyJobs = jobs.filter(j => (j.state?.lastStatus || "ok") !== "ok").length;
  return e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12,padding:"16px 20px",overflowY:"auto",flex:1,alignContent:"start"}},
    e("div",{className:"card"},
      e("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:"#F7B731",marginBottom:10}},"OpenClaw"),
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}},
        e(StatBox,{label:"VERSION", value:openclaw.version?.version || "—", color:"#F7B731", small:true}),
        e(StatBox,{label:"SERVICE", value:openclaw.service?.active || "—", color:openclaw.service?.healthy ? "#34D399" : "#F87171", small:true}),
        e(StatBox,{label:"MODEL", value:openclaw.config?.primaryModel || "—", color:"#D4C9B4", small:true}),
        e(StatBox,{label:"HEARTBEAT", value:openclaw.config?.heartbeatEvery || "—", color:"#D4C9B4", small:true})
      )
    ),
    e("div",{className:"card"},
      e("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:"#4ECDC4",marginBottom:10}},"Discord"),
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}},
        e(StatBox,{label:"CONNECTED", value:discord.connected ? "yes" : "no", color:discord.connected ? "#34D399" : "#F87171", small:true}),
        e(StatBox,{label:"BOT", value:discord.bot?.username || "—", color:"#4ECDC4", small:true}),
        e(StatBox,{label:"PROBE", value:discord.probe?.ok ? "ok" : "bad", color:discord.probe?.ok ? "#34D399" : "#F87171", small:true}),
        e(StatBox,{label:"LAST CONNECT", value:fmtAgo(discord.lastConnectedAt), color:"#D4C9B4", small:true})
      )
    ),
    e("div",{className:"card"},
      e("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:"#34D399",marginBottom:10}},"Cron"),
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}},
        e(StatBox,{label:"JOBS", value:jobs.length, color:"#34D399", small:true}),
        e(StatBox,{label:"UNHEALTHY", value:unhealthyJobs, color:unhealthyJobs ? "#F59E0B" : "#34D399", small:true}),
        e(StatBox,{label:"DAILY NOTE", value:openclaw.dailyNote?.exists ? "present" : "missing", color:openclaw.dailyNote?.exists ? "#34D399" : "#F87171", small:true}),
        e(StatBox,{label:"TAILSCALE", value:system.tailscaleIp || "off", color:system.tailscaleIp ? "#34D399" : "#8A9BB0", small:true})
      )
    ),
    e("div",{className:"card"},
      e("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:"#D4C9B4",marginBottom:10}},"Budget Policy"),
      e("div",{style:{display:"grid",gap:8}},
        e(StatBox,{label:"DAILY TARGET", value:tokens.dailyTarget || "—", color:"#D4C9B4", small:true}),
        e(StatBox,{label:"MONTHLY TARGET", value:tokens.monthlyTarget || "—", color:"#D4C9B4", small:true}),
        e(StatBox,{label:"ROUTINE OUTPUT", value:tokens.routineOutputTarget || "—", color:"#D4C9B4", small:true}),
        e(StatBox,{label:"COMPLEX OUTPUT", value:tokens.complexOutputTarget || "—", color:"#D4C9B4", small:true})
      )
    )
  );
}

function SessionsTab({sessions=[]}) {
  if (!sessions.length) return e("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60%",gap:10}},
    e("div",{style:{fontSize:30}},"💤"),
    e("div",{style:{fontSize:10,color:"#1E2A35"}},"NO OPENCLAW SESSIONS FOUND")
  );
  return e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12,padding:"16px 20px",overflowY:"auto",flex:1,alignContent:"start"}},
    sessions.map(s => {
      const c=s.abortedLastRun?"#F87171":"#34D399";
      return e("div",{key:s.name,className:"card",style:{borderColor:c+"28"}},
        e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
          e("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:c}},s.displayName),
          e("div",{style:{display:"flex",alignItems:"center",gap:5}},
            e(Dot,{color:c,size:6}),
            e("span",{style:{fontSize:8,color:c,letterSpacing:1}},s.abortedLastRun?"ABORTED":"ACTIVE")
          )
        ),
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}},
          e(StatBox,{label:"CHAT TYPE", value:s.chatType || "—", color:getColor(s.lastChannel || ""), small:true}),
          e(StatBox,{label:"UPDATED", value:fmtAgo(s.updatedAt), color:"#D4C9B4", small:true}),
          e(StatBox,{label:"CHANNEL", value:s.lastChannel || "—", color:"#4ECDC4", small:true}),
          e(StatBox,{label:"TARGET", value:s.lastTo || "—", color:"#D4C9B4", small:true})
        )
      );
    })
  );
}

function CronTab({jobs=[]}) {
  if (!jobs.length) return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"60%",fontSize:10,color:"#1E2A35"}},"NO CRON JOBS FOUND");
  return e("div",{style:{flex:1,overflowY:"auto",padding:"16px 20px"}},
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:12}},
      jobs.map(job => {
        const ok = (job.state?.lastStatus || "ok") === "ok";
        return e("div",{key:job.id,className:"card",style:{borderColor:(ok?"#34D399":"#F59E0B")+"28"}},
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}},
            e("div",null,
              e("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:ok?"#34D399":"#F59E0B"}},job.name),
              e("div",{className:"label"},job.sessionTarget || "—")
            ),
            e("div",{style:{display:"flex",alignItems:"center",gap:5}},
              e(Dot,{color:ok?"#34D399":"#F59E0B",size:6}),
              e("span",{style:{fontSize:8,color:ok?"#34D399":"#F59E0B",letterSpacing:1}},(job.state?.lastStatus || "unknown").toUpperCase())
            )
          ),
          e("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}},
            e(StatBox,{label:"NEXT RUN", value:fmtAgo(job.state?.nextRunAtMs), color:"#D4C9B4", small:true}),
            e(StatBox,{label:"LAST RUN", value:fmtAgo(job.state?.lastRunAtMs), color:"#D4C9B4", small:true}),
            e(StatBox,{label:"DELIVERY", value:job.delivery?.mode || "—", color:"#4ECDC4", small:true}),
            e(StatBox,{label:"ERRORS", value:job.state?.consecutiveErrors || 0, color:(job.state?.consecutiveErrors||0) ? "#F59E0B" : "#34D399", small:true})
          )
        );
      })
    )
  );
}

// ── Logs Tab ─────────────────────────────────────────────────────────────────
function LogsTab({logs=[]}) {
  return e("div",{style:{flex:1,overflowY:"auto",padding:"12px 20px"}},
    logs.length===0
      ? e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"60%",fontSize:10,color:"#1E2A35"}},"NO LOG ENTRIES FOUND")
      : logs.map((l,i) =>
          e("div",{key:i,className:"log-row"},
            e("span",{style:{fontSize:8,color:"#1E2A35",flexShrink:0,minWidth:76}},l.ts?new Date(l.ts).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—"),
            e("span",{style:{fontSize:8,color:l.level==="ERROR"?"#F87171":l.level==="WARN"?"#F59E0B":"#1E2A35",flexShrink:0,minWidth:52}},l.level || "INFO"),
            e("span",{style:{fontSize:10,color:"#5A6A7E",lineHeight:1.5}},l.msg)
          )
        )
  );
}

// ── System Tab ───────────────────────────────────────────────────────────────
function SystemTab({system={}, openclaw={}}) {
  const rows = [
    {label:"OpenClaw Version", value:openclaw.version?.raw || "—"},
    {label:"Gateway Service", value:`${openclaw.service?.active || "—"} / ${openclaw.service?.enabled || "—"}`},
    {label:"Heartbeat Model", value:openclaw.config?.heartbeatModel || "—"},
    {label:"Daily Note", value:openclaw.dailyNote?.path || "—"},
    {label:"Uptime",   value:system.uptime||"—"},
    {label:"Disk",     value:system.disk||"—"},
    {label:"Memory",   value:(system.memUsed||0)+"MB / "+(system.memTotal||0)+"MB ("+( system.memPct||0)+"%)"},
    {label:"Load Avg", value:system.loadAvg||"—"},
    {label:"Ports",    value:(system.ports||[]).join(", ")||"—"},
    {label:"Tailscale IP", value:system.tailscaleIp || "—"},
  ];
  return e("div",{style:{flex:1,overflowY:"auto",padding:"16px 20px"}},
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}},
      rows.map(r => e("div",{key:r.label,className:"card"},
        e("div",{className:"label",style:{marginBottom:8}},r.label),
        e("div",{style:{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"#D4C9B4",lineHeight:1.6}},r.value)
      ))
    )
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [data,   setData]   = useState(null);
  const [logs,   setLogs]   = useState([]);
  const [tab,    setTab]    = useState("overview");
  const [now,    setNow]    = useState(new Date());
  const [error,  setError]  = useState(null);
  const [alert,  setAlert]  = useState(null);

  const fetchData = useCallback(async () => {
    try {
      const [status, logsRes] = await Promise.all([
        fetch("/api/status").then(r=>r.json()),
        fetch("/api/logs").then(r=>r.json()),
      ]);
      if (status.openclaw && !status.openclaw.dailyNote?.exists) {
        setAlert({msg:"⚠️ Heartbeat alert: today's daily note is missing, so the heartbeat loop is not writing visible progress.", sev:"warn"});
      } else if (status.openclaw && !status.openclaw.service?.healthy) {
        setAlert({msg:"🚨 OpenClaw gateway is not active", sev:"error"});
      }
      setData(status);
      setLogs(logsRes.logs || []);
      setError(null);
    } catch(err) { setError(err.message); }
  }, []);

  useEffect(() => { fetchData(); }, []);
  useEffect(() => { const t=setInterval(()=>{fetchData();setNow(new Date());},5000); return()=>clearInterval(t); }, [fetchData]);
  useEffect(() => {
    if (!alert) return;
    const t = setTimeout(() => setAlert(null), 9000);
    return () => clearTimeout(t);
  }, [alert]);

  const { openclaw={}, sessions=[], system={}, tokens={} } = data || {};
  const jobs = openclaw.cron?.jobs || [];
  const unhealthyJobs = jobs.filter(j => (j.state?.lastStatus || "ok") !== "ok").length;

  if (!data) return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#F7B731",fontSize:12}},
    "🎬 Connecting to Mission Control..."
  );

  return e("div",{style:{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}},

    // Alert
    alert && e("div",{className:"alert",style:{
      background:alert.sev==="error"?"rgba(248,113,113,.12)":"rgba(245,158,11,.12)",
      borderBottom:`1px solid ${alert.sev==="error"?"#F87171":"#F59E0B"}`,
      color:alert.sev==="error"?"#F87171":"#F59E0B",
    }}, alert.msg, e("span",{style:{marginLeft:"auto",fontSize:9,opacity:.5}},now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}))),

    e(TopBar,{openclaw,system,now,error}),

    // Tabs
    e("div",{style:{display:"flex",borderBottom:"1px solid rgba(255,255,255,.04)",flexShrink:0}},
      [
        {id:"overview", label:"Overview", badge:(!openclaw.dailyNote?.exists || !openclaw.service?.healthy) ? 1 : 0},
        {id:"cron",     label:"Cron",     badge:unhealthyJobs},
        {id:"sessions", label:"Sessions", badge:sessions.filter(s=>s.abortedLastRun).length},
        {id:"logs",     label:"Logs",     badge:0},
        {id:"system",   label:"System",   badge:0},
      ].map(t =>
        e("button",{key:t.id,className:"tab "+(tab===t.id?"on":""),onClick:()=>setTab(t.id)},
          t.label,
          t.badge > 0 && e("span",{className:"badge",style:{background:"#F87171",color:"#000"}},t.badge)
        )
      )
    ),

    // Tab content
    e("div",{style:{flex:1,display:"flex",overflow:"hidden"}},
      tab==="overview" && e(OverviewTab,{openclaw,system,tokens}),
      tab==="cron"     && e(CronTab,{jobs}),
      tab==="sessions" && e(SessionsTab,{sessions}),
      tab==="logs"     && e(LogsTab,{logs}),
      tab==="system"   && e(SystemTab,{system,openclaw})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
